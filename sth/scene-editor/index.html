<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Scene Editor</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>SCENE EDITOR</h1>
  <div class="toolbar">
    <button onclick="app.undo()" title="Ctrl+Z">↩ 撤销</button>
    <button onclick="app.redo()" title="Ctrl+Y">↪ 重做</button>
    <div class="sep"></div>
    <button id="btnAddBuilding" class="green" onclick="app.addBuilding()">＋ 建筑</button>
    <select id="addPropSelect" onchange="if(this.value){app.addProp(this.value);this.value=''}">
      <option value="">＋ 道具…</option>
      <option value="lamp-far">路灯（远）</option>
      <option value="lamp-near">路灯（近）</option>
      <option value="bench">长椅</option>
      <option value="trash">垃圾桶</option>
      <option value="sign">招牌</option>
    </select>
    <div class="sep"></div>
    <button class="blue" onclick="app.importScene()">📂 导入</button>
    <button class="green" onclick="app.exportScene()">💾 导出 scene.json</button>
    <div class="sep"></div>
    <span class="zoom-label">缩放:</span>
    <button onclick="app.setZoom(app.zoom-0.1)">−</button>
    <span id="zoomLevel">60%</span>
    <button onclick="app.setZoom(app.zoom+0.1)">＋</button>
    <button onclick="app.setZoom(0.6)">重置</button>
  </div>
</header>

<div class="main-area">
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="canvas"></canvas>
  </div>

  <div class="side-panel">
    <div class="panel-section">
      <h3>选中元素</h3>
      <div id="noSelection" class="hint">点击场景中的元素以选中<br>建筑边缘可拖拽缩放</div>
      <div id="propsPanel"></div>
    </div>

    <div class="panel-section">
      <h3>使用说明</h3>
      <div class="hint small">
        <b>拖动</b> — 移动元素<br>
        <b>边缘橙点</b> — 缩放建筑<br>
        <b>Del</b> — 删除选中<br>
        <b>Esc</b> — 取消选中<br>
        <b>Ctrl+Z/Y</b> — 撤销/重做<br>
        <b>导出</b>后替换 assets/scene.json
      </div>
    </div>
  </div>
</div>

<div class="status-bar">
  <span id="statusCoords">X: 0  Y: 0</span>
  <span id="statusInfo"></span>
</div>

<script src="js/app.js"></script>
</body>
</html>

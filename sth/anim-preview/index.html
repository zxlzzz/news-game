<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Animator Debugger</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <span class="title">ANIMATOR DEBUGGER</span>
  <span class="status-bar" id="statusBar">Ready</span>
  <div class="header-actions">
    <button class="sm green" onclick="app.exportAll()">📋 导出全部</button>
  </div>
</header>

<div class="main-layout">

  <!-- ─── 左栏：预览 + 控制 ─────────────────────────────────── -->
  <div class="left-col">
    <canvas id="previewCanvas" class="preview-canvas"></canvas>
    <div class="controls-scroll" id="controlPanel">
      <!-- 由 JS 动态生成 -->
    </div>
  </div>

  <!-- ─── 右栏：Animation Graph ─────────────────────────────── -->
  <div class="right-col">
    <div class="graph-header">
      <span class="graph-title">Animation Graph</span>
      <div class="graph-toolbar">
        <select id="graphProfile" onchange="app.graph.setProfile(this.value)"></select>
        <label class="chk-label" title="显示转换概率标签">
          <input type="checkbox" id="showEdgeLabels" checked onchange="app.graph.render()">
          概率
        </label>
      </div>
    </div>
    <svg id="animGraph" class="graph-svg"></svg>
    <div class="graph-legend">
      <span class="leg move">●移动</span>
      <span class="leg idle">●闲置</span>
      <span class="leg sit">●坐靠</span>
      <span class="leg ground">●地面</span>
      <span class="leg special">●特殊</span>
      <span class="leg social">●社交</span>
    </div>
  </div>
</div>

<!-- ─── 底部控制栏 ──────────────────────────────────────────── -->
<footer class="bottom-bar">
  <div class="pb-group">
    <button id="playBtn" onclick="app.pb.toggle()" class="pb-btn">▶</button>
    <button onclick="app.pb.step(-1)" class="pb-btn" title="Q / ←">◀</button>
    <button onclick="app.pb.step(1)"  class="pb-btn" title="E / →">▶</button>
  </div>
  <span class="sep"></span>
  <span class="bot-label">Frame</span>
  <span id="frameInfo" class="frame-info">—</span>
  <span class="sep"></span>
  <span class="bot-label">Speed</span>
  <div class="speed-btns" id="speedBtns">
    <button class="spd" data-s="0.25" onclick="app.pb.setSpeed(0.25)">0.25×</button>
    <button class="spd" data-s="0.5"  onclick="app.pb.setSpeed(0.5)">0.5×</button>
    <button class="spd spd-act" data-s="1"    onclick="app.pb.setSpeed(1)">1×</button>
    <button class="spd" data-s="2"    onclick="app.pb.setSpeed(2)">2×</button>
  </div>
  <span class="sep"></span>
  <button onclick="app.pb.resetAllFrames()" class="sm">↺ 重置帧</button>
</footer>

<script type="module" src="js/app.js"></script>
</body>
</html>

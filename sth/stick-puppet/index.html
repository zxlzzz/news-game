<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>StickPuppet</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loadingOverlay" class="loading-overlay hidden">
  <span id="loadingText">加载中...</span>
</div>

<header>
  <h1>STICK PUPPET</h1>
  <div class="toolbar">
    <button onclick="app.undo()" title="Ctrl+Z">↩ 撤销</button>
    <button onclick="app.redo()" title="Ctrl+Shift+Z">↪ 重做</button>
    <button onclick="app.mirrorPose()" title="左右关节互换">↔ 左右互换</button>
    <button onclick="app.resetPose()">重置姿势</button>
    <button onclick="app.exportSpriteSheet()" class="green">导出 Sprite Sheet</button>
    <button id="gestureModeBtn" onclick="app.toggleGestureMode()">姿势片段</button>
    <button id="translateModeBtn" onclick="app.toggleTranslateMode()" title="G — 整体平移整具骨架">⟺ 全局平移</button>
  </div>
</header>

<div class="main-area">
  <div class="canvas-wrap">
    <canvas id="stage" width="500" height="500"></canvas>
  </div>
  
  <div class="side-panel">
    <div class="panel-section">
      <h3>骨骼类型</h3>
      <select id="skeletonSelect" onchange="app.switchSkeleton(this.value)" style="
        width:100%; padding:4px 8px; font-size:12px;
        font-family:'JetBrains Mono',monospace;
        background:var(--bg); color:var(--fg);
        border:1px solid var(--border); border-radius:4px;">
        <option value="human">🧍 人</option>
        <option value="child">🧒 小孩</option>
        <option value="dog">🐕 狗</option>
        <option value="cat">🐈 猫</option>
      </select>
    </div>
    <div class="panel-section">
      <h3>拖拽模式</h3>
      <button id="lockBtn" onclick="app.toggleBoneLock()">🔒 骨骼锁定（旋转模式）</button>
      <div class="mode-indicator mode-locked" id="modeIndicator">关节绕父骨骼旋转，长度固定</div>
      <div class="check-row">
        <label><input type="checkbox" id="onionSkin" checked onchange="app.render()"> 洋葱皮</label>
      </div>
      <div class="check-row">
        <label><input type="checkbox" id="showLabels" onchange="app.render()"> 显示名称</label>
      </div>
      <div class="info" id="infoText">拖动红色关节点摆姿势</div>
    </div>
    
    <div class="panel-section">
      <h3>从图片提取姿势</h3>
      <button onclick="document.getElementById('imageUpload').click()" class="blue" style="width:100%">
        📷 上传图片提取
      </button>
      <input type="file" id="imageUpload" accept="image/*" onchange="app.handleImageUpload(event)">
      <div class="drop-hint">支持 jpg/png，首次需加载模型(~5MB)</div>
    </div>
    
    <div class="panel-section">
      <h3>补帧插值</h3>
      <div class="interp-row">
        <label>从帧</label>
        <input type="number" id="interpFrom" value="1" min="1">
        <label>到帧</label>
        <input type="number" id="interpTo" value="2" min="1">
        <label>插入</label>
        <input type="number" id="interpCount" value="4" min="1" max="30">
        <label>帧</label>
      </div>
      <div class="btn-row" style="margin-top:6px">
        <button onclick="app.interpolateFrames()" class="blue">生成补帧</button>
      </div>
    </div>
    
    <div class="panel-section">
      <h3>当前帧坐标</h3>
      <div id="coordsPanel" class="coords-panel"></div>
    </div>

    <div class="panel-section">
      <h3>骨骼长度</h3>
      <div id="boneLengthPanel" class="coords-panel"></div>
    </div>
    
    <div class="panel-section" id="jointSelectPanel" style="display:none">
      <h3>活跃关节</h3>
      <div id="jointCheckboxes"></div>
    </div>

    <div class="panel-section" id="clipBrowserSection">
      <h3>Clip 浏览器</h3>
      <div style="display:flex;gap:4px;margin-bottom:4px">
        <select id="clipTypeFilter" onchange="app.filterClips()" style="flex:1;padding:3px;font-size:11px;font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:3px">
          <option value="">全部</option>
          <option value="cycle">cycle</option>
          <option value="overlay">overlay</option>
          <option value="transition">transition</option>
          <option value="variant">variant</option>
        </select>
        <select id="clipFacingFilter" onchange="app.filterClips()" style="flex:1;padding:3px;font-size:11px;font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:3px">
          <option value="">朝向</option>
          <option value="side">side</option>
          <option value="front">front</option>
        </select>
      </div>
      <input type="text" id="clipTagFilter" placeholder="ID / 标签过滤..." oninput="app.filterClips()" style="width:100%;margin-bottom:4px;padding:3px;font-size:11px;font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:3px;box-sizing:border-box">
      <select id="clipBrowserList" size="6" style="width:100%;font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:3px" ondblclick="app.loadClipFromBrowser()"></select>
      <button onclick="app.loadClipFromBrowser()" class="primary" style="width:100%;margin-top:4px">载入选中 Clip</button>
      <div id="clipBrowserInfo" style="font-size:10px;color:#888;margin-top:4px;line-height:1.4"></div>
    </div>

    <div class="panel-section" id="previewSection">
      <h3>合成预览</h3>
      <div class="check-row">
        <label><input type="checkbox" id="previewEnable" onchange="app.togglePreview()"> 启用合成预览</label>
      </div>
      <div id="previewControls" style="display:none">
        <select id="previewBaseSelect" onchange="app.loadPreviewBase()" style="width:100%;margin:4px 0;padding:3px;font-size:11px;font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:3px">
          <option value="">-- 选择 base clip --</option>
        </select>
        <div style="font-size:10px;color:#888">蓝色=base，实色=合成结果</div>
      </div>
    </div>

    <div class="panel-section" id="duetPanel" style="display:none">
      <h3>参与者</h3>
      <div id="duetRoleButtons" style="display:flex;gap:4px;flex-wrap:wrap"></div>
      <div style="font-size:10px;color:#888;margin-top:4px">点击按钮切换编辑角色；拖拽另一角色根关节调整相对位置</div>
    </div>

    <div class="panel-section" id="variantPanel" style="display:none">
      <h3>变体参数</h3>
      <div class="coord-row">
        <span class="coord-label">base</span>
        <select id="variantOfSelect" onchange="app.updateVariantParam('variant_of',this.value)" style="flex:1;padding:2px;font-size:11px;font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:3px"></select>
      </div>
      <div class="coord-row">
        <span class="coord-label">amp</span>
        <input type="number" id="variantAmp" step="0.05" min="0" max="3" value="1" onchange="app.updateVariantParam('amp',parseFloat(this.value))" style="width:60px">
      </div>
      <div class="coord-row">
        <span class="coord-label">ref_speed</span>
        <input type="number" id="variantRefSpeed" step="0.05" min="0" value="" placeholder="—" onchange="app.updateVariantParam('ref_speed',parseFloat(this.value)||null)" style="width:60px">
      </div>
      <div class="coord-row">
        <span class="coord-label">overlay</span>
        <input type="text" id="variantOverlay" placeholder="overlay id" onchange="app.updateVariantParam('overlay',this.value||null)" style="flex:1;padding:2px;font-size:11px;font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:3px">
      </div>
      <div style="font-size:10px;color:#888;margin-top:4px">实时预览：蓝色=原始，橙色=amp缩放</div>
    </div>

    <div class="panel-section" id="transitionSection" style="display:none">
      <h3>衔接检查</h3>
      <div style="display:flex;align-items:center;gap:4px;margin-bottom:3px">
        <span style="font-size:11px;color:#888;min-width:28px">from</span>
        <select id="transFromSelect" onchange="app.setTransitionRef('from',this.value)" style="flex:1;padding:2px;font-size:11px;font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:3px">
          <option value="">-- 无 --</option>
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:4px;margin-bottom:3px">
        <span style="font-size:11px;color:#888;min-width:28px">to</span>
        <select id="transToSelect" onchange="app.setTransitionRef('to',this.value)" style="flex:1;padding:2px;font-size:11px;font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--fg);border:1px solid var(--border);border-radius:3px">
          <option value="">-- 无 --</option>
        </select>
      </div>
      <div style="font-size:10px;color:#c44;margin-top:3px">红圈 = 偏差 &gt;5px 的关节</div>
    </div>

    <div class="json-area">
      <h3>JSON 导入/导出</h3>
      <textarea id="jsonInput" placeholder='粘贴动画 JSON...'></textarea>
      <div class="btn-row">
        <button onclick="app.loadJSON()" class="primary">载入</button>
        <button onclick="app.exportJSON()">导出</button>
      </div>
    </div>
  </div>
</div>

<div class="timeline">
  <div class="timeline-controls">
    <button onclick="app.addFrame()" class="primary">+ 添加帧</button>
    <button onclick="app.dupFrame()">复制当前帧</button>
    <button onclick="app.moveFrameLeft()">◀ 前移</button>
    <button onclick="app.moveFrameRight()">▶ 后移</button>
    <button onclick="app.delFrame()">删除当前帧</button>
  </div>
  <div class="frames-strip" id="framesStrip"></div>
  <div class="play-controls">
    <button id="playBtn" onclick="app.togglePlay()">▶ 播放</button>
    <label>FPS</label>
    <input type="number" id="fpsInput" value="8" min="1" max="30">
  </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
